<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MizuPanel</title>
  <desc id="desc">A black minimalist technology README banner for MizuPanel with server nodes, HUD panels, monitoring lines, and cyan teal status accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020305"/>
      <stop offset="0.52" stop-color="#05080D"/>
      <stop offset="1" stop-color="#020606"/>
    </linearGradient>

    <linearGradient id="cyanLine" x1="260" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891B2" stop-opacity="0.08"/>
      <stop offset="0.42" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0.72"/>
    </linearGradient>

    <linearGradient id="chartLine" x1="270" y1="346" x2="760" y2="346" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>

    <radialGradient id="serverGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1078 238) rotate(18) scale(330 190)">
      <stop stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1F2937" stroke-width="1" opacity="0.46"/>
    </pattern>

    <pattern id="fineGrid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0H0V10" stroke="#0F172A" stroke-width="0.7" opacity="0.34"/>
    </pattern>

    <pattern id="noise" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="8" r="0.8" fill="#94A3B8" opacity="0.08"/>
      <circle cx="21" cy="31" r="0.7" fill="#67E8F9" opacity="0.07"/>
      <circle cx="45" cy="14" r="0.9" fill="#CBD5E1" opacity="0.06"/>
      <circle cx="58" cy="53" r="0.8" fill="#2DD4BF" opacity="0.06"/>
      <circle cx="14" cy="55" r="0.6" fill="#E2E8F0" opacity="0.05"/>
      <circle cx="38" cy="42" r="0.5" fill="#38BDF8" opacity="0.07"/>
    </pattern>

    <pattern id="scanlines" x="0" y="0" width="1" height="8" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#E0F2FE" opacity="0.035"/>
    </pattern>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <filter id="panelShadow" x="120" y="74" width="1360" height="332" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.48"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L8 5L1 9" stroke="#67E8F9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>

    <style>
      .titleText { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 92px; font-weight: 850; letter-spacing: 1.5px; fill: #F8FAFC; }
      .subtitleText { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 27px; font-weight: 520; letter-spacing: 0.5px; fill: #94A3B8; }
      .monoText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.8px; fill: #67E8F9; }
      .tagText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 14px; font-weight: 800; letter-spacing: 0.6px; fill: #DFFBFF; }
      .smallText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 11px; font-weight: 800; letter-spacing: 1.2px; fill: #64748B; }
      .hudLine { stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#grid)" opacity="0.7"/>
  <rect width="1600" height="480" fill="url(#fineGrid)" opacity="0.65"/>
  <rect width="1600" height="480" fill="url(#noise)"/>
  <rect width="1600" height="480" fill="url(#scanlines)"/>
  <rect width="1600" height="480" fill="url(#serverGlow)"/>

  <g opacity="0.32" stroke="#0F766E" stroke-width="1">
    <path d="M0 104H1600"/>
    <path d="M0 376H1600"/>
    <path d="M184 0V480"/>
    <path d="M1416 0V480"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="150" y="86" width="1300" height="308" rx="18" fill="#03070B" fill-opacity="0.78" stroke="#1E3A47"/>
    <path d="M178 122V104H244" stroke="#22D3EE" stroke-width="1.4" opacity="0.72"/>
    <path d="M1422 122V104H1356" stroke="#22D3EE" stroke-width="1.4" opacity="0.72"/>
    <path d="M178 358V376H244" stroke="#14B8A6" stroke-width="1.4" opacity="0.58"/>
    <path d="M1422 358V376H1356" stroke="#14B8A6" stroke-width="1.4" opacity="0.58"/>
  </g>

  <g transform="translate(230 132)">
    <rect x="0" y="0" width="604" height="124" rx="12" fill="#050B12" stroke="#1F3B4A"/>
    <path d="M18 22H74" stroke="#22D3EE" stroke-width="2" opacity="0.78"/>
    <path d="M18 102H156" stroke="#134E4A" stroke-width="1.4" opacity="0.8"/>
    <text x="24" y="78" class="titleText">MizuPanel</text>
    <circle cx="548" cy="30" r="5" fill="#22C55E" filter="url(#softGlow)"/>
    <circle cx="568" cy="30" r="5" fill="#22D3EE" opacity="0.78" filter="url(#softGlow)"/>
    <circle cx="588" cy="30" r="5" fill="#334155"/>
  </g>

  <text x="254" y="292" class="subtitleText">Lightweight self-hosted server monitoring</text>
  <text x="256" y="323" class="monoText">AGENT → SERVER · WEBSOCKET TELEMETRY · SQLITE STORAGE</text>

  <g transform="translate(252 342)">
    <rect width="112" height="34" rx="6" fill="#06131C" stroke="#164E63"/>
    <text x="18" y="22" class="tagText">CPU 24%</text>
  </g>
  <g transform="translate(380 342)">
    <rect width="112" height="34" rx="6" fill="#06131C" stroke="#155E75"/>
    <text x="18" y="22" class="tagText">MEM 41%</text>
  </g>
  <g transform="translate(508 342)">
    <rect width="122" height="34" rx="6" fill="#06131C" stroke="#0F766E"/>
    <text x="18" y="22" class="tagText">DISK 68%</text>
  </g>
  <g transform="translate(646 342)">
    <rect width="112" height="34" rx="6" fill="#06131C" stroke="#14B8A6"/>
    <text x="20" y="22" class="tagText">NET OK</text>
  </g>

  <g transform="translate(252 318)" opacity="0.9">
    <path d="M0 0H512" stroke="#102A36"/>
    <path d="M0-34H512" stroke="#102A36" opacity="0.72"/>
    <path d="M0-68H512" stroke="#102A36" opacity="0.5"/>
    <path d="M0 0L44-12L82-8L126-36L172-28L212-44L252-38L296-72L342-54L382-62L426-50L474-78L512-70" stroke="url(#chartLine)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softGlow)"/>
    <circle cx="296" cy="-72" r="3.5" fill="#22D3EE"/>
    <circle cx="474" cy="-78" r="3.5" fill="#5EEAD4"/>
  </g>

  <g transform="translate(962 118)">
    <rect x="74" y="108" width="148" height="96" rx="14" fill="#061014" stroke="#2DD4BF" stroke-opacity="0.8" filter="url(#softGlow)"/>
    <rect x="96" y="132" width="104" height="12" rx="3" fill="#164E63"/>
    <rect x="96" y="156" width="104" height="12" rx="3" fill="#155E75"/>
    <rect x="96" y="180" width="104" height="12" rx="3" fill="#0F766E"/>
    <circle cx="204" cy="138" r="3" fill="#22C55E"/>
    <circle cx="204" cy="162" r="3" fill="#22D3EE"/>
    <circle cx="204" cy="186" r="3" fill="#5EEAD4"/>
    <text x="148" y="232" text-anchor="middle" class="smallText">CENTER SERVER</text>

    <g opacity="0.95">
      <rect x="-8" y="12" width="92" height="56" rx="10" fill="#050B12" stroke="#164E63"/>
      <rect x="-8" y="244" width="92" height="56" rx="10" fill="#050B12" stroke="#164E63"/>
      <rect x="310" y="18" width="92" height="56" rx="10" fill="#050B12" stroke="#0F766E"/>
      <rect x="320" y="244" width="92" height="56" rx="10" fill="#050B12" stroke="#0F766E"/>
      <rect x="382" y="126" width="92" height="56" rx="10" fill="#050B12" stroke="#155E75"/>
    </g>

    <g class="hudLine" stroke="url(#cyanLine)" stroke-width="1.6" opacity="0.9">
      <path d="M84 40C122 40 128 128 178 128" marker-end="url(#arrow)"/>
      <path d="M84 272C126 272 130 188 178 188" marker-end="url(#arrow)"/>
      <path d="M310 46C266 46 260 128 216 128" marker-end="url(#arrow)"/>
      <path d="M320 272C272 272 266 188 216 188" marker-end="url(#arrow)"/>
      <path d="M382 154C320 154 282 154 222 154" marker-end="url(#arrow)"/>
    </g>

    <g fill="#22D3EE" filter="url(#softGlow)">
      <circle cx="38" cy="40" r="3"/>
      <circle cx="38" cy="272" r="3"/>
      <circle cx="356" cy="46" r="3"/>
      <circle cx="366" cy="272" r="3"/>
      <circle cx="428" cy="154" r="3"/>
    </g>

    <g class="smallText">
      <text x="38" y="45" text-anchor="middle">N1</text>
      <text x="38" y="277" text-anchor="middle">N2</text>
      <text x="356" y="51" text-anchor="middle">N3</text>
      <text x="366" y="277" text-anchor="middle">N4</text>
      <text x="428" y="159" text-anchor="middle">N5</text>
    </g>
  </g>

  <path d="M820 238H922" stroke="#22D3EE" stroke-width="1.4" stroke-dasharray="6 8" opacity="0.7" marker-end="url(#arrow)"/>
  <text x="842" y="222" class="smallText">OUTBOUND AGENTS</text>

  <g opacity="0.38" stroke="#334155" stroke-width="1">
    <path d="M122 72H310"/>
    <path d="M1290 410H1478"/>
    <path d="M122 410H260"/>
    <path d="M1340 72H1478"/>
  </g>
</svg>
